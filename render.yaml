services:
  - type: web
    name: alanya-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: alanya-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: MAIL_PROVIDER
        value: console
      - key: MEDIA_STORAGE_PROVIDER
        value: local
      - key: PUSH_ENABLED
        value: "false"

databases:
  - name: alanya-db
    databaseName: alanya
    user: alanya
    plan: free
